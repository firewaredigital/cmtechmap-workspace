# ==============================================================================
# CM TECHMAP — OCI Always Free Docker Compose (E2.1.Micro — 1 GB RAM + 2 GB Swap)
# Ultra-otimizado para o shape AMD micro com recursos extremamente limitados
# ==============================================================================
# Este compose roda os serviços ESSENCIAIS para testes do backend.
# Serviços de monitoramento (Prometheus, Grafana) e processamento pesado
# (NodeODM, Celery Beat) são excluídos para caber na memória.
#
# Consumo estimado de RAM:
#   PostgreSQL:     ~150 MB (limit 384 MB)
#   Redis:          ~30 MB (limit 96 MB)
#   MinIO:          ~80 MB (limit 256 MB)
#   Keycloak:       ~256 MB (limit 512 MB)
#   Backend:        ~200 MB (limit 384 MB)
#   Celery Worker:  ~150 MB (limit 384 MB)
#   Nginx:          ~16 MB (limit 64 MB)
#   ─────────────────────────────────────────────
#   TOTAL:          ~882 MB idle / ~2 GB peak (swap)
# ==============================================================================

name: cm-techmap-oci

services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL + PostGIS (ultra-constrained)
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.5
    container_name: cmo-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cm_techmap}
      POSTGRES_USER: ${POSTGRES_USER:-cm_techmap_oci}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_MULTIPLE_DATABASES: ${KC_POSTGRES_DB:-keycloak}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=256MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=4MB
        -c work_mem=4MB
        -c max_connections=20
        -c max_worker_processes=2
        -c max_parallel_workers=2
        -c max_parallel_workers_per_gather=1
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=5000
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - cm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cm_techmap_oci} -d ${POSTGRES_DB:-cm_techmap}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # ────────────────────────────────────────────────────────────────────────────
  # Redis (minimal)
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cmo-redis
    restart: always
    command: >
      redis-server
        --appendonly yes
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
        --save 300 100
        --tcp-keepalive 300
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - /data/redis:/data
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 96M

  # ────────────────────────────────────────────────────────────────────────────
  # MinIO (S3-Compatible Object Storage)
  # ────────────────────────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:latest
    container_name: cmo-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cm_techmap_oci}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    volumes:
      - /data/minio:/data
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  minio-setup:
    image: quay.io/minio/mc:latest
    container_name: cmo-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cm_techmap_oci}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes:
      - ./docker/minio/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    networks:
      - cm-network

  # ────────────────────────────────────────────────────────────────────────────
  # Keycloak (IAM — constrained JVM)
  # ────────────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    container_name: cmo-keycloak
    restart: always
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-cm_techmap_oci}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_FEATURES_DISABLED: "kerberos,par,dpop,ciba,client-policies"
      JAVA_OPTS_APPEND: >-
        -Xms128m -Xmx384m
        -XX:MaxMetaspaceSize=192m
        -Xss256k
        -XX:ActiveProcessorCount=1
        -XX:CICompilerCount=2
        -XX:ParallelGCThreads=1
        -XX:+UseCompressedOops
    command: start --import-realm
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cm-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 2048
        reservations:
          memory: 192M

  # ────────────────────────────────────────────────────────────────────────────
  # Backend — FastAPI (single worker, minimal)
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./cm-techmap-backend
      dockerfile: Dockerfile
    container_name: cmo-backend
    restart: always
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 1
        --timeout-keep-alive 5
        --log-level ${API_LOG_LEVEL:-warning}
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_SECRET_KEY=${APP_SECRET_KEY:?APP_SECRET_KEY must be set}
      - APP_CORS_ORIGINS=${APP_CORS_ORIGINS:-*}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cm_techmap_oci}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cm_techmap}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-cm_techmap_oci}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cm_techmap}
      - DATABASE_URL_DIRECT=postgresql+asyncpg://${POSTGRES_USER:-cm_techmap_oci}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cm_techmap}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-cm_techmap_oci}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_USE_SSL=false
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-cm-techmap}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-cm-techmap-api}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USERNAME:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # ────────────────────────────────────────────────────────────────────────────
  # Celery Worker (single process, minimal)
  # ────────────────────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./cm-techmap-backend
      dockerfile: Dockerfile
    container_name: cmo-celery-worker
    restart: always
    command: >
      celery -A app.celery_app worker
        --loglevel=warning
        --concurrency=1
        --queues=default,processing,reports
        --max-tasks-per-child=50
        -n worker@%h
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cm_techmap_oci}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cm_techmap}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-cm_techmap_oci}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cm_techmap}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-cm_techmap_oci}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_USE_SSL=false
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - cm-network
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  # ────────────────────────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy (HTTP only for micro instance)
  # ────────────────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.prod
    container_name: cmo-nginx
    restart: always
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-_}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - /data/certbot:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/nginx-health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  cm-network:
    driver: bridge
    name: cm-techmap-oci-network
