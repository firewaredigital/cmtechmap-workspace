# ==============================================================================
# CM TECHMAP — Grafana Dashboard Provisioning
# Auto-loads dashboards from /var/lib/grafana/dashboards on first boot.
# ==============================================================================

apiVersion: 1

providers:
  - name: "CM TECHMAP"
    orgId: 1
    folder: "CM TECHMAP"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
