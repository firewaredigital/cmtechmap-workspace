;; ==============================================================================
;; CM TECHMAP — PgBouncer Configuration
;; Transaction-mode connection pooler for PostgreSQL
;; Supports 150+ municipalities with 1000+ concurrent users
;; ==============================================================================

[databases]
;; Main application database — all tenant schemas share one DB
cm_techmap = host=postgres port=5432 dbname=cm_techmap auth_user=cm_techmap_prod

;; Keycloak database
keycloak = host=postgres port=5432 dbname=keycloak auth_user=cm_techmap_prod

;; Wildcard fallback — any database name will connect to postgres
* = host=postgres port=5432 auth_user=cm_techmap_prod

[pgbouncer]
;; ── Listening ────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer

;; ── Authentication ───────────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; ── Pool Mode ────────────────────────────────────────────────────────────────
;; TRANSACTION mode: connection is returned to pool after each transaction
;; This is optimal for FastAPI/asyncpg where each request = one transaction
pool_mode = transaction

;; ── Pool Size ────────────────────────────────────────────────────────────────
;; default_pool_size: connections per user+db pair
;; With 4 Gunicorn workers × 20 pool_size = 80 backend connections
;; Plus Celery workers + Martin + TiTiler ≈ 20 more
;; Total server-side connections ≈ 100 (PG max_connections=200 leaves headroom)
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3

;; ── Client Limits ────────────────────────────────────────────────────────────
;; max_client_conn: total simultaneous client connections
;; 150 municipalities × ~7 users online = ~1050 peak connections
max_client_conn = 2000

;; max_db_connections: max server connections per database
max_db_connections = 100

;; max_user_connections: max server connections per user
max_user_connections = 100

;; ── Timeouts ─────────────────────────────────────────────────────────────────
;; How long to wait for a connection from pool
server_connect_timeout = 15

;; Close server connection if idle this long
server_idle_timeout = 300

;; Close client connection if idle this long
client_idle_timeout = 600

;; Cancel query if running longer than this
query_timeout = 300

;; Wait for server response this long
query_wait_timeout = 60

;; Cancel query if client disconnects
cancel_wait = 10

;; ── Connection Lifecycle ─────────────────────────────────────────────────────
;; Close server connections after this many transactions
;; Prevents issues with long-lived connections holding tenant schema state
server_lifetime = 1800

;; Reset connection state when returning to pool
;; CRITICAL for multi-tenant: clears search_path between tenants
server_reset_query = DISCARD ALL

;; Check if server is alive before giving to client
server_check_query = SELECT 1
server_check_delay = 30

;; ── Logging ──────────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
log_stats = 1
stats_period = 60

;; ── Admin Interface ──────────────────────────────────────────────────────────
admin_users = cm_techmap_prod,pgbouncer_admin
stats_users = cm_techmap_prod,pgbouncer_stats

;; ── TCP Settings ─────────────────────────────────────────────────────────────
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 6
tcp_user_timeout = 30000

;; ── TLS (when connecting to PostgreSQL) ──────────────────────────────────────
;; Uncomment for TLS to PostgreSQL
; server_tls_sslmode = prefer
; server_tls_ca_file = /etc/pgbouncer/root.crt

;; ── Application Name ─────────────────────────────────────────────────────────
application_name_add_host = 1

;; ── DNS ──────────────────────────────────────────────────────────────────────
dns_max_ttl = 15
dns_zone_check_period = 5
