# ==============================================================================
# CM TECHMAP — Production Nginx Configuration
# HTTPS termination + reverse proxy + security hardening
# ==============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    log_format json_combined escape=json
        '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"http_referer":"$http_referer",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;  # Hide nginx version

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/vnd.mapbox-vector-tile
        application/x-protobuf
        text/css
        text/plain
        text/xml
        text/javascript
        image/svg+xml;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 500M;  # Large drone uploads
    client_body_buffer_size 16k;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=tile_limit:20m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=public_limit:20m rate=50r/s;

    # ── Proxy cache ───────────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tile_cache:50m
                     max_size=5g inactive=1h use_temp_path=off;
    proxy_cache_path /var/cache/nginx/vectors levels=1:2 keys_zone=vector_cache:50m
                     max_size=2g inactive=30m use_temp_path=off;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 8;
    }

    upstream titiler {
        server titiler:80;
        keepalive 16;
    }

    upstream martin {
        server martin:3000;
        keepalive 16;
    }

    upstream flower {
        server flower:5555;
    }

    upstream grafana {
        server grafana:3000;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # HTTP → HTTPS redirect (port 80)
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name ${DOMAIN_NAME} www.${DOMAIN_NAME};

        # Let's Encrypt challenge (certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Health check (bypass redirect)
        location /nginx-health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # HTTPS Server (port 443) — Main Application
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        http2 on;
        server_name ${DOMAIN_NAME} www.${DOMAIN_NAME};

        # ── SSL Configuration ─────────────────────────────────────────────────
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # Modern TLS configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # SSL session caching
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.arcgisonline.com https://server.arcgisonline.com; connect-src 'self' ws: wss: https://*.arcgisonline.com https://server.arcgisonline.com https://tiles.openfreemap.org https://servicodados.ibge.gov.br https://apitempo.inmet.gov.br;" always;

        # ── Health check ──────────────────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Request-ID $request_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            client_max_body_size 500M;
        }

        # ── Auth endpoints (stricter rate limiting) ───────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Upload endpoints ──────────────────────────────────────────────────
        location /api/v1/uploads/ {
            limit_req zone=upload_limit burst=10 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            client_max_body_size 500M;
            proxy_request_buffering off;  # Stream large uploads
        }

        # ── Backend Swagger/Docs (disabled in production by default) ──────────
        location /docs {
            # In production, restrict access by IP or remove entirely
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /redoc {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Prometheus Metrics (internal only) ────────────────────────────────
        location /metrics {
            # Only allow from internal monitoring
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── WebSocket — Processing Updates ────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── TiTiler — Raster Tile Server ──────────────────────────────────────
        location /tiles/ {
            limit_req zone=tile_limit burst=400 nodelay;

            rewrite ^/tiles/(.*) /$1 break;
            proxy_pass http://titiler;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cache tile responses (nginx-level)
            proxy_cache tile_cache;
            proxy_cache_valid 200 2h;
            proxy_cache_valid 404 1m;
            proxy_cache_key "$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ── Martin — Vector Tile Server ───────────────────────────────────────
        location /vector/ {
            limit_req zone=tile_limit burst=400 nodelay;

            rewrite ^/vector/(.*) /$1 break;
            proxy_pass http://martin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_cache vector_cache;
            proxy_cache_valid 200 30m;
            proxy_cache_key "$request_uri";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ── Flower — Celery Monitoring (restricted) ───────────────────────────
        location /flower/ {
            # Restrict to internal network
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;

            rewrite ^/flower/(.*) /$1 break;
            proxy_pass http://flower;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Grafana — Monitoring Dashboard (restricted) ───────────────────────
        location /grafana/ {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;

            rewrite ^/grafana/(.*) /$1 break;
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Frontend SPA (catch-all) ──────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
