# ==============================================================================
# CM TECHMAP — Nginx Reverse Proxy Configuration
# Unified gateway for all platform services
# ==============================================================================

# ── Global ────────────────────────────────────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/xml
        application/vnd.mapbox-vector-tile
        application/x-protobuf
        text/css
        text/plain
        text/xml
        text/javascript
        image/svg+xml;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size 200M;
    client_body_buffer_size 16k;
    proxy_read_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=tile_limit:10m rate=100r/s;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream titiler {
        server titiler:80;
        keepalive 16;
    }

    upstream martin {
        server martin:3000;
        keepalive 16;
    }

    upstream flower {
        server flower:5555;
    }

    upstream grafana {
        server grafana:3000;
    }

    upstream minio_console {
        server minio:9001;
    }

    # ══════════════════════════════════════════════════════════════════════════
    # Main Server — Port 80
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
        # HSTS — uncomment when SSL is configured:
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://server.arcgisonline.com https://*.arcgisonline.com; connect-src 'self' ws: wss: https://*.tile.openstreetmap.org https://tiles.openfreemap.org https://server.arcgisonline.com https://servicodados.ibge.gov.br https://apitempo.inmet.gov.br;" always;

        # ── Health check ──────────────────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # ── Backend API ───────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Large uploads
            client_max_body_size 200M;
        }

        # ── Backend Swagger/Docs ──────────────────────────────────────────────
        location /docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /redoc {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Backend Metrics (Prometheus) ──────────────────────────────────────
        location /metrics {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── WebSocket — Processing Updates ────────────────────────────────────
        location /ws/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── TiTiler — Raster Tile Server ──────────────────────────────────────
        location /tiles/ {
            limit_req zone=tile_limit burst=200 nodelay;

            rewrite ^/tiles/(.*) /$1 break;
            proxy_pass http://titiler;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cache tile responses
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Access-Control-Allow-Origin "*";
        }

        # ── Martin — Vector Tile Server ───────────────────────────────────────
        location /vector/ {
            limit_req zone=tile_limit burst=200 nodelay;

            rewrite ^/vector/(.*) /$1 break;
            proxy_pass http://martin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cache vector tiles
            proxy_cache_valid 200 30m;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Access-Control-Allow-Origin "*";
        }

        # ── Flower — Celery Monitoring ────────────────────────────────────────
        location /flower/ {
            rewrite ^/flower/(.*) /$1 break;
            proxy_pass http://flower;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect off;
        }

        # ── Grafana — Monitoring Dashboard ────────────────────────────────────
        location /grafana/ {
            rewrite ^/grafana/(.*) /$1 break;
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket for Grafana live
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── MinIO Console ─────────────────────────────────────────────────────
        location /minio/ {
            rewrite ^/minio/(.*) /$1 break;
            proxy_pass http://minio_console;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket for MinIO console
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Frontend SPA (catch-all) ──────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }
    }
}
