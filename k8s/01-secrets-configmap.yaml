# ==============================================================================
# CM TECHMAP — Secrets (Template — fill values before applying)
# ==============================================================================
# IMPORTANT: Replace <BASE64_ENCODED_VALUE> with actual base64-encoded secrets
# Use: echo -n "your-secret" | base64
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cm-techmap-secrets
  namespace: cm-techmap
type: Opaque
data:
  # PostgreSQL
  POSTGRES_PASSWORD: <BASE64_ENCODED_VALUE>
  DATABASE_URL: <BASE64_ENCODED_VALUE>
  
  # Redis
  REDIS_URL: <BASE64_ENCODED_VALUE>
  
  # MinIO
  MINIO_ACCESS_KEY: <BASE64_ENCODED_VALUE>
  MINIO_SECRET_KEY: <BASE64_ENCODED_VALUE>
  
  # Keycloak
  KEYCLOAK_CLIENT_SECRET: <BASE64_ENCODED_VALUE>
  KEYCLOAK_ADMIN_USERNAME: <BASE64_ENCODED_VALUE>
  KEYCLOAK_ADMIN_PASSWORD: <BASE64_ENCODED_VALUE>
  
  # SMTP (for password recovery)
  SMTP_PASSWORD: <BASE64_ENCODED_VALUE>

---
# ==============================================================================
# ConfigMap — Non-sensitive configuration
# ==============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cm-techmap-config
  namespace: cm-techmap
data:
  APP_NAME: "CM TECHMAP"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  
  # PostgreSQL
  POSTGRES_HOST: "postgres-primary.cm-techmap.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "cm_techmap"
  POSTGRES_USER: "cm_techmap"
  
  # Redis
  REDIS_HOST: "redis.cm-techmap.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # MinIO
  MINIO_ENDPOINT: "minio.cm-techmap.svc.cluster.local:9000"
  MINIO_SECURE: "false"
  MINIO_BUCKET_RAW_UPLOADS: "cm-raw-uploads"
  MINIO_BUCKET_ORTHOMOSAICS: "cm-orthomosaics"
  MINIO_BUCKET_REPORTS: "cm-reports"
  MINIO_BUCKET_ELEVATION_MODELS: "cm-elevation-models"
  
  # Keycloak
  KEYCLOAK_SERVER_URL: "http://keycloak.cm-techmap.svc.cluster.local:8080"
  KEYCLOAK_REALM: "cm-techmap"
  KEYCLOAK_CLIENT_ID: "cm-techmap-api"
  
  # CORS
  CORS_ORIGINS: "https://techmap.cm-solucoes.com.br,https://app.cm-solucoes.com.br"
  
  # NodeODM
  ODM_HOST: "nodeodm.cm-techmap.svc.cluster.local"
  ODM_PORT: "3000"
