# ==============================================================================
# CM TECHMAP — Production Docker Compose
# Hardened configuration for deployment with 150+ municipalities
# ==============================================================================
# Usage:
#   ./scripts/generate-secrets.sh         # Generate .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#   docker compose -f docker-compose.prod.yml logs -f backend
# ==============================================================================

name: cm-techmap-prod

services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL + PostGIS — Production Database
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.5
    container_name: cmp-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cm_techmap}
      POSTGRES_USER: ${POSTGRES_USER:-cm_techmap_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_MULTIPLE_DATABASES: ${KC_POSTGRES_DB:-keycloak}
      # Performance tuning for production
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
        -c shared_buffers=4GB
        -c effective_cache_size=12GB
        -c maintenance_work_mem=1GB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
        -c default_statistics_target=200
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=32MB
        -c min_wal_size=2GB
        -c max_wal_size=8GB
        -c max_worker_processes=8
        -c max_parallel_workers_per_gather=4
        -c max_parallel_workers=8
        -c max_parallel_maintenance_workers=4
        -c max_connections=200
        -c log_min_duration_statement=1000
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
        -c log_lock_waits=on
        -c log_temp_files=0
        -c track_counts=on
        -c track_io_timing=on
        -c track_functions=all
    ports:
      - "127.0.0.1:15432:5432"  # Only localhost access
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - cm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cm_techmap_prod} -d ${POSTGRES_DB:-cm_techmap}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G

  # ────────────────────────────────────────────────────────────────────────────
  # Redis — Production Cache & Broker
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cmp-redis
    restart: always
    command: >
      redis-server
        --appendonly yes
        --maxmemory ${REDIS_MAX_MEMORY:-2gb}
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --save 300 100
        --tcp-backlog 511
        --timeout 0
        --tcp-keepalive 300
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  # ────────────────────────────────────────────────────────────────────────────
  # PgBouncer — Connection Pooling (transaction mode)
  # ────────────────────────────────────────────────────────────────────────────
  pgbouncer:
    build:
      context: ./docker/pgbouncer
      dockerfile: Dockerfile
    container_name: cmp-pgbouncer
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cm_techmap_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "127.0.0.1:16432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ────────────────────────────────────────────────────────────────────────────
  # MinIO — S3-Compatible Object Storage
  # ────────────────────────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:latest
    container_name: cmp-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cm_techmap_prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_BROWSER_REDIRECT_URL: https://${DOMAIN_NAME:-localhost}/minio-console
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    volumes:
      - minio_data:/data
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G

  minio-setup:
    image: quay.io/minio/mc:latest
    container_name: cmp-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cm_techmap_prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes:
      - ./docker/minio/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ["/bin/sh", "/init-buckets.sh"]
    networks:
      - cm-network

  # ────────────────────────────────────────────────────────────────────────────
  # Keycloak — Identity & Access Management
  # ────────────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    container_name: cmp-keycloak
    restart: always
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KC_POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-cm_techmap_prod}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      KC_HOSTNAME: https://${DOMAIN_NAME:-localhost}/auth
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command: start --import-realm --optimized
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cm-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  # ────────────────────────────────────────────────────────────────────────────
  # Backend — FastAPI (Gunicorn multi-worker, NO --reload)
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./cm-techmap-backend
      dockerfile: Dockerfile
    container_name: cmp-backend
    restart: always
    command: >
      gunicorn app.main:app
        --worker-class uvicorn.workers.UvicornWorker
        --bind 0.0.0.0:8000
        --workers ${GUNICORN_WORKERS:-4}
        --timeout 300
        --graceful-timeout 30
        --keep-alive 5
        --max-requests 5000
        --max-requests-jitter 500
        --access-logfile -
        --error-logfile -
        --log-level ${API_LOG_LEVEL:-warning}
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_SECRET_KEY=${APP_SECRET_KEY:?APP_SECRET_KEY must be set}
      - APP_CORS_ORIGINS=https://${DOMAIN_NAME:-localhost}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cm_techmap_prod}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-cm_techmap}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-cm_techmap_prod}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-cm_techmap}
      - DATABASE_URL_DIRECT=postgresql+asyncpg://${POSTGRES_USER:-cm_techmap_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cm_techmap}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-cm_techmap_prod}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_USE_SSL=false
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_EXTERNAL_URL=https://${DOMAIN_NAME:-localhost}/auth
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-cm-techmap}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-cm-techmap-api}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - KEYCLOAK_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USERNAME:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - NODEODM_HOST=nodeodm
      - NODEODM_PORT=3000
      - TITILER_URL=http://titiler:80
      - TITILER_EXTERNAL_URL=https://${DOMAIN_NAME:-localhost}/tiles
      - MARTIN_URL=http://martin:3000
      - MARTIN_EXTERNAL_URL=https://${DOMAIN_NAME:-localhost}/vector
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend — Production Build (Nginx serving static assets)
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./cm-techmap-frontend
      dockerfile: Dockerfile
    container_name: cmp-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ────────────────────────────────────────────────────────────────────────────
  # Celery Worker — Async Task Processing
  # ────────────────────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./cm-techmap-backend
      dockerfile: Dockerfile
    container_name: cmp-celery-worker
    restart: always
    command: >
      celery -A app.celery_app worker
        --loglevel=info
        --concurrency=${CELERY_CONCURRENCY:-8}
        --autoscale=${CELERY_AUTOSCALE:-16,4}
        --queues=default,processing,reports
        --max-tasks-per-child=500
        -n worker@%h
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-cm_techmap_prod}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-cm_techmap}
      - DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-cm_techmap_prod}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-cm_techmap}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-cm_techmap_prod}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_USE_SSL=false
      - NODEODM_HOST=nodeodm
      - NODEODM_PORT=3000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - cm-network
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  # ────────────────────────────────────────────────────────────────────────────
  # Flower — Celery Monitoring
  # ────────────────────────────────────────────────────────────────────────────
  flower:
    build:
      context: ./cm-techmap-backend
      dockerfile: Dockerfile
    container_name: cmp-flower
    restart: always
    command: >
      celery -A app.celery_app flower
        --port=5555
        --broker_api=redis://redis:6379/0
        --basic-auth=${FLOWER_BASIC_AUTH:-admin:changeme}
        --persistent=True
        --db=/data/flower.db
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
      - "127.0.0.1:5555:5555"
    volumes:
      - flower_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cm-network

  # ────────────────────────────────────────────────────────────────────────────
  # NodeODM — Photogrammetry Engine
  # ────────────────────────────────────────────────────────────────────────────
  nodeodm:
    image: opendronemap/nodeodm:latest
    container_name: cmp-nodeodm
    restart: always
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      - nodeodm_data:/var/www/data
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G

  # ────────────────────────────────────────────────────────────────────────────
  # TiTiler — Dynamic Raster Tile Server
  # ────────────────────────────────────────────────────────────────────────────
  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    container_name: cmp-titiler
    restart: always
    environment:
      CPL_TMPDIR: /tmp
      GDAL_CACHEMAX: "512"
      GDAL_INGESTED_BYTES_AT_OPEN: "32768"
      GDAL_DISABLE_READDIR_ON_OPEN: EMPTY_DIR
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"
      GDAL_HTTP_MULTIPLEX: "YES"
      VSI_CACHE: "TRUE"
      VSI_CACHE_SIZE: "1073741824"  # 1GB
      PYTHONWARNINGS: ignore
      TITILER_API_CORS_ORIGINS: "https://${DOMAIN_NAME:-localhost}"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-cm_techmap_prod}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_HTTPS: "NO"
      AWS_VIRTUAL_HOSTING: "FALSE"
    ports:
      - "127.0.0.1:18888:80"
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ────────────────────────────────────────────────────────────────────────────
  # Martin — PostGIS Vector Tile Server
  # ────────────────────────────────────────────────────────────────────────────
  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: cmp-martin
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cm_techmap_prod}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-cm_techmap}
    ports:
      - "127.0.0.1:13001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # Nginx — Production Reverse Proxy (HTTPS + HTTP/2)
  # ────────────────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.prod
    container_name: cmp-nginx
    restart: always
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - certbot_data:/var/www/certbot
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────────────
  # Backup — Automated PostgreSQL Backup to S3
  # ────────────────────────────────────────────────────────────────────────────
  backup:
    build:
      context: ./docker/backup
      dockerfile: Dockerfile
    container_name: cmp-backup
    restart: always
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-cm_techmap}
      - POSTGRES_USER=${POSTGRES_USER:-cm_techmap_prod}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - KC_POSTGRES_DB=${KC_POSTGRES_DB:-keycloak}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-cm_techmap_prod}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-cm-techmap-backups}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_CRON_SCHEDULE=${BACKUP_CRON_SCHEDULE:-0 3 * * *}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cm-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ────────────────────────────────────────────────────────────────────────────
  # Prometheus — Metrics Collection
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: cmp-prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────────────────
  # Grafana — Monitoring Dashboards
  # ────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: cmp-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_SERVER_ROOT_URL: "https://${DOMAIN_NAME:-localhost}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/cm-techmap.json
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - cm-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

# ──────────────────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────────────────
networks:
  cm-network:
    driver: bridge
    name: cm-techmap-prod-network

# ──────────────────────────────────────────────────────────────────────────────
# Persistent Volumes
# ──────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    name: cmp-postgres-data
  redis_data:
    driver: local
    name: cmp-redis-data
  minio_data:
    driver: local
    name: cmp-minio-data
  nodeodm_data:
    driver: local
    name: cmp-nodeodm-data
  prometheus_data:
    driver: local
    name: cmp-prometheus-data
  grafana_data:
    driver: local
    name: cmp-grafana-data
  flower_data:
    driver: local
    name: cmp-flower-data
  certbot_data:
    driver: local
    name: cmp-certbot-data
